<!DOCTYPE html>
<html>

<head>

    <title>Student Management System - Registration</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-success text-white text-center">

                        <h3>
                            🎓 Student Management System
                        </h3>

                    </div>

                    <div class="card-body">

                        <h4 class="text-center mb-4">
                            Registration
                        </h4>

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    name="confirm_password"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Role
                                </label>

                                <select
                                    name="role"
                                    class="form-select"
                                    required
                                >

                                    <option value="">
                                        Select Role
                                    </option>

                                    <option value="Teacher">
                                        Teacher
                                    </option>

                                    <option value="Student">
                                        Student
                                    </option>

                                </select>

                            </div>

                            <div class="d-grid">

                                <button
                                    type="submit"
                                    class="btn btn-success"
                                >
                                    Register
                                </button>

                            </div>

                        </form>

                        <hr>

                        <div class="text-center">

                            <a href="/login">
                                Already have an account? Login
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
