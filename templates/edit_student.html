<!DOCTYPE html>
<html>

<head>

    <title>Edit Student</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                🎓 Student Management System
            </span>

            <a
                href="/students"
                class="btn btn-light"
            >
                Back
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-warning">

                        <h3>
                            ✏️ Edit Student
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Roll Number
                                </label>

                                <input
                                    type="text"
                                    name="roll_no"
                                    value="{{ student.roll_no }}"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Student Name
                                </label>

                                <input
                                    type="text"
                                    name="name"
                                    value="{{ student.name }}"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    value="{{ student.email }}"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="tel"
                                    name="phone"
                                    value="{{ student.phone }}"
                                    pattern="[0-9]{10}"
                                    maxlength="10"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Course
                                </label>

                                <input
                                    type="text"
                                    name="course"
                                    value="{{ student.course }}"
                                    class="form-control"
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Year
                                </label>

                                <select
                                    name="year"
                                    class="form-select"
                                >

                                    <option
                                        {% if student.year == "First Year" %}selected{% endif %}
                                    >
                                        First Year
                                    </option>

                                    <option
                                        {% if student.year == "Second Year" %}selected{% endif %}
                                    >
                                        Second Year
                                    </option>

                                    <option
                                        {% if student.year == "Third Year" %}selected{% endif %}
                                    >
                                        Third Year
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Address
                                </label>

                                <textarea
                                    name="address"
                                    class="form-control"
                                    rows="3"
                                >{{ student.address }}</textarea>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-warning"
                            >
                                Update Student
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
