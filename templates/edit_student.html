<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

    <h1>Edit Student</h1>

    <form method="POST">

        <label>Roll Number</label><br>
        <input type="text"
               name="roll_no"
               value="{{ student.roll_no }}"
               required>
        <br><br>

        <label>Name</label><br>
        <input type="text"
               name="name"
               value="{{ student.name }}"
               required>
        <br><br>

        <label>Email</label><br>
        <input type="email"
               name="email"
               value="{{ student.email }}"
               required>
        <br><br>

        <label>Phone</label><br>
        <input type="tel"
                name="phone"
                value="{{ student.phone }}"
                pattern="[0-9]{10}"
                maxlength="10"
                required>
        <br><br>

        <label>Course</label><br>
        <input type="text"
               name="course"
               value="{{ student.course }}">
        <br><br>

        <label>Year</label><br>
        <input type="text"
               name="year"
               value="{{ student.year }}">
        <br><br>

        <label>Address</label><br>
        <textarea name="address">{{ student.address }}</textarea>
        <br><br>

        <button type="submit">
            Update Student
        </button>

    </form>

</body>
</html>
