<!DOCTYPE html>
<html>

<head>

    <title>Add Student</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">
    <div class="container mt-3">

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div
                        class="alert alert-{{ category }} alert-dismissible fade show"
                        role="alert"
                    >

                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                        ></button>

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

    </div>

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Student Management System
            </span>

            <a
                href="/students"
                class="btn btn-light"
            >
                Back
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3>
                            Add Student
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Roll Number
                                </label>

                                <input
                                    type="text"
                                    name="roll_no"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Student Name
                                </label>

                                <input
                                    type="text"
                                    name="name"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone
                                </label>

                                <input
                                    type="text"
                                    name="phone"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Course
                                </label>

                                <input
                                    type="text"
                                    name="course"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Year
                                </label>

                                <select
                                    name="year"
                                    class="form-select"
                                    required
                                >
                                    <option value="">
                                        Select Year
                                    </option>

                                    <option>
                                        First Year
                                    </option>

                                    <option>
                                        Second Year
                                    </option>

                                    <option>
                                        Third Year
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Semester
                                </label>

                                <select
                                    name="semester"
                                    class="form-select"
                                    required
                                >

                                    <option value="">
                                    Select Semester
                                    </option>

                                    <option>
                                    Semester 1
                                    </option>

                                    <option>
                                    Semester 2
                                    </option>

                                    <option>
                                    Semester 3
                                    </option>

                                    <option>
                                    Semester 4
                                    </option>

                                    <option>
                                    Semester 5
                                    </option>

                                    <option>
                                        Semester 6
                                    </option>

                                    </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Address
                                </label>

                                <textarea
                                    name="address"
                                    class="form-control"
                                    rows="3"
                                ></textarea>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success"
                            >
                                Save Student
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
