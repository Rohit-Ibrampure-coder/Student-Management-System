<!DOCTYPE html>
<html>

<head>

    <title>Mark Attendance</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Student Management System
            </span>

            <div>

                <a
                    href="{{ dashboard_link }}"
                    class="btn btn-light"
                >
                    Dashboard
                </a>

                <a
                    href="/attendance-records"
                    class="btn btn-warning"
                >
                    Records
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3>
                            Mark Attendance
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Student
                                </label>

                                <select
                                    name="student_id"
                                    class="form-select"
                                    required
                                >

                                    {% for student in students %}

                                    <option value="{{ student.id }}">
                                        {{ student.roll_no }} - {{ student.name }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Date
                                </label>

                                <input
                                    type="date"
                                    name="date"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Status
                                </label>

                                <select
                                    name="status"
                                    class="form-select"
                                >

                                    <option value="Present">
                                        Present
                                    </option>

                                    <option value="Absent">
                                        Absent
                                    </option>

                                </select>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success"
                            >
                                Save Attendance
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
