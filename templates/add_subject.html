<!DOCTYPE html>
<html>

<head>

    <title>Add Subject</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Student Management System
            </span>

            <a
                href="/subjects"
                class="btn btn-light"
            >
                Back
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3>
                            Add Subject
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Course
                                </label>

                                <input
                                    type="text"
                                    name="course"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Semester
                                </label>

                                <select
                                    name="semester"
                                    class="form-select"
                                    required
                                >

                                    <option value="">
                                        Select Semester
                                    </option>

                                    <option>Semester 1</option>
                                    <option>Semester 2</option>
                                    <option>Semester 3</option>
                                    <option>Semester 4</option>
                                    <option>Semester 5</option>
                                    <option>Semester 6</option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Subject Name
                                </label>

                                <input
                                    type="text"
                                    name="subject_name"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success"
                            >
                                Save Subject
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
