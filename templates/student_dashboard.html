<!DOCTYPE html>
<html>

<head>

    <title>Student Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                🎓 Student Portal
            </span>

            <a
                href="/logout"
                class="btn btn-light"
            >
                Logout
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="card shadow">

            <div class="card-body">

                <h2>
                    Welcome, {{ user.name }}
                </h2>

                <p>
                    Access your attendance, marks and report card from one place.
                </p>

            </div>

        </div>

        <div class="row mt-4">

            <div class="col-md-4">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h1>📅</h1>

                        <h4>
                            My Attendance
                        </h4>

                        <p>
                            View your attendance summary.
                        </p>

                        <a
                            href="/my-attendance"
                            class="btn btn-success"
                        >
                            View Attendance
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h1>📚</h1>

                        <h4>
                            My Marks
                        </h4>

                        <p>
                            View subject-wise marks.
                        </p>

                        <a
                            href="/my-marks"
                            class="btn btn-primary"
                        >
                            View Marks
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h1>📄</h1>

                        <h4>
                            My Report Card
                        </h4>

                        <p>
                            View percentage and grade.
                        </p>

                        <a
                            href="/my-report-card"
                            class="btn btn-warning"
                        >
                            View Report Card
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
