<!DOCTYPE html>
<html>

<head>

    <title>Add Marks</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Student Management System
            </span>

            <a
                href="/marks-records"
                class="btn btn-light"
            >
                View Marks Records
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3>
                            Add Student Marks
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Student
                                </label>

                                <select
                                    name="student_id"
                                    class="form-select"
                                    required
                                >

                                    {% for student in students %}

                                    <option value="{{ student.id }}">
                                        {{ student.roll_no }} - {{ student.name }}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Subject
                                </label>

                                <select
                                    name="subject"
                                    class="form-select"
                                    required
                                >

                                    <option value="Python">
                                        Python
                                    </option>

                                    <option value="DBMS">
                                        DBMS
                                    </option>

                                    <option value="Java">
                                        Java
                                    </option>

                                    <option value="Web Development">
                                        Web Development
                                    </option>

                                    <option value="Data Structures">
                                        Data Structures
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Obtained Marks
                                </label>

                                <input
                                    type="number"
                                    name="obtained_marks"
                                    min="0"
                                    max="1000"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Total Marks
                                </label>

                                <input
                                    type="number"
                                    name="total_marks"
                                    min="1"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success"
                            >
                                Save Marks
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
