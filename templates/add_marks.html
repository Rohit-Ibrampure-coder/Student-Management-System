<!DOCTYPE html>

<html>

<head>

```
<title>Add Marks</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>
```

</head>

<body class="bg-light">

```
<div class="container mt-3">

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div
                    class="alert alert-{{ category }} alert-dismissible fade show"
                    role="alert"
                >

                    {{ message }}

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                    ></button>

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

</div>

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand">
            Student Management System
        </span>

        <div>

            <a href="{{ dashboard_link }}" class="btn btn-light">
                Dashboard
            </a>

            <a href="/marks-records" class="btn btn-success">
                Marks Records
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>
                        Add Student Marks
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Student
                            </label>

                            <select
                                name="student_id"
                                class="form-select"
                                required
                            >

                                {% for student in students %}

                                <option value="{{ student.id }}">
                                    {{ student.roll_no }} - {{ student.name }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Subject
                            </label>

                            <select
                                name="subject"
                                class="form-select"
                                required
                            >

                                {% for subject in subjects %}

                                <option value="{{ subject.subject_name }}">
                                    {{ subject.subject_name }}
                                    ({{ subject.semester }})
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Obtained Marks
                            </label>

                            <input
                                type="number"
                                name="obtained_marks"
                                min="0"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Total Marks
                            </label>

                            <input
                                type="number"
                                name="total_marks"
                                min="1"
                                class="form-control"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success"
                        >
                            Save Marks
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
```

</body>

</html>
