<!DOCTYPE html>
<html>

<head>

    <title>Edit Marks</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                🎓 Student Management System
            </span>

            <a
                href="/marks-records"
                class="btn btn-light"
            >
                Back
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-warning">

                        <h3>
                            ✏️ Edit Marks
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Subject
                                </label>

                                <input
                                    type="text"
                                    value="{{ mark.subject }}"
                                    class="form-control"
                                    readonly
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Obtained Marks
                                </label>

                                <input
                                    type="number"
                                    name="obtained_marks"
                                    value="{{ mark.obtained_marks }}"
                                    class="form-control"
                                    min="0"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Total Marks
                                </label>

                                <input
                                    type="number"
                                    name="total_marks"
                                    value="{{ mark.total_marks }}"
                                    class="form-control"
                                    min="1"
                                    required
                                >

                            </div>

                            <button
                                type="submit"
                                class="btn btn-warning"
                            >
                                Update Marks
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
