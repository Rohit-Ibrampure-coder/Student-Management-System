<!DOCTYPE html>
<html>
<head>

    <title>Admin Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Student Management System
            </span>

            <a
                href="/logout"
                class="btn btn-light"
            >
                Logout
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <h1>
            Admin Dashboard
        </h1>

        <h4>
            Welcome, {{ user.name }}
        </h4>

        <hr>

        <div class="row">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h3>
                            Students
                        </h3>

                        <a
                            href="/students"
                            class="btn btn-primary"
                        >
                            Manage Students
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h3>
                            Attendance
                        </h3>

                        <a
                            href="/attendance"
                            class="btn btn-success"
                        >
                            Attendance
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h3>
                            Marks
                        </h3>

                        <a
                            href="/marks"
                            class="btn btn-warning"
                        >
                            Marks
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
