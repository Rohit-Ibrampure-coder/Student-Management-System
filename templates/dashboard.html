<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>
                    Dashboard
                </h3>

            </div>

            <div class="card-body">

                <h4>
                    Welcome {{ user.name }}
                </h4>

                <p>
                    <strong>Email:</strong>
                    {{ user.email }}
                </p>

                <p>
                    <strong>Role:</strong>
                    {{ user.role }}
                </p>

                <hr>

                <a
                    href="/logout"
                    class="btn btn-danger"
                >
                    Logout
                </a>

            </div>

        </div>

    </div>

</body>

</html>
