<!DOCTYPE html>
<html>

<head>

    <title>Edit Subject</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                Subject Management
            </span>

            <a href="/subjects" class="btn btn-light">
                Back
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-warning">

                        <h3>
                            Edit Subject
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Course
                                </label>

                                <input type="text" name="course" value="{{ subject.course }}" class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Semester
                                </label>

                                <select name="semester" class="form-select" required>

                                    <option value="Semester 1" {% if subject.semester=="Semester 1" %}selected{% endif
                                        %}>
                                        Semester 1
                                    </option>

                                    <option value="Semester 2" {% if subject.semester=="Semester 2" %}selected{% endif
                                        %}>
                                        Semester 2
                                    </option>

                                    <option value="Semester 3" {% if subject.semester=="Semester 3" %}selected{% endif
                                        %}>
                                        Semester 3
                                    </option>

                                    <option value="Semester 4" {% if subject.semester=="Semester 4" %}selected{% endif
                                        %}>
                                        Semester 4
                                    </option>

                                    <option value="Semester 5" {% if subject.semester=="Semester 5" %}selected{% endif
                                        %}>
                                        Semester 5
                                    </option>

                                    <option value="Semester 6" {% if subject.semester=="Semester 6" %}selected{% endif
                                        %}>
                                        Semester 6
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Subject Name
                                </label>

                                <input type="text" name="subject_name" value="{{ subject.subject_name }}"
                                    class="form-control" required>

                            </div>

                            <button type="submit" class="btn btn-warning">
                                Update Subject
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
