<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>
</head>
<body>

    <h1>My Attendance</h1>

    <h3>Name: {{ student.name }}</h3>

    <h3>Roll No: {{ student.roll_no }}</h3>

    <hr>

    <h3>
        Total Classes:
        {{ total_classes }}
    </h3>

    <h3>
        Present:
        {{ present_count }}
    </h3>

    <h3>
        Absent:
        {{ absent_count }}
    </h3>

    <h3>
        Attendance Percentage:
        {{ percentage }}%
    </h3>

</body>
</html>
