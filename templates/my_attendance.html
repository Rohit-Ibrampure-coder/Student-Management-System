<!DOCTYPE html>
<html>

<head>

    <title>My Attendance</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container">

            <span class="navbar-brand">
                🎓 Student Portal
            </span>

            <a
                href="/student-dashboard"
                class="btn btn-light"
            >
                Dashboard
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h3>
                    📅 My Attendance
                </h3>

            </div>

            <div class="card-body">

                <h4>
                    Name:
                    {{ student.name }}
                </h4>

                <h5>
                    Roll No:
                    {{ student.roll_no }}
                </h5>

                <hr>

                <div class="row text-center">

                    <div class="col-md-3">

                        <div class="card border-primary">

                            <div class="card-body">

                                <h5>
                                    Total Classes
                                </h5>

                                <h2 class="text-primary">
                                    {{ total_classes }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card border-success">

                            <div class="card-body">

                                <h5>
                                    Present
                                </h5>

                                <h2 class="text-success">
                                    {{ present_count }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card border-danger">

                            <div class="card-body">

                                <h5>
                                    Absent
                                </h5>

                                <h2 class="text-danger">
                                    {{ absent_count }}
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card border-warning">

                            <div class="card-body">

                                <h5>
                                    Attendance %
                                </h5>

                                <h2 class="text-warning">
                                    {{ percentage }}%
                                </h2>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
